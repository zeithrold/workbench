services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: ["postgres", "-c", "wal_level=logical"]

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  redpanda:
    profiles: ["distributed"]
    image: redpandadata/redpanda:v25.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: workbench
      MINIO_ROOT_PASSWORD: workbench
    ports:
      - "9000:9000"
      - "9001:9001"

  debezium:
    profiles: ["distributed"]
    image: quay.io/debezium/connect:3.1.2.Final
    depends_on:
      postgres:
        condition: service_started
      redpanda:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: workbench-connect
      CONFIG_STORAGE_TOPIC: workbench.connect.configs
      OFFSET_STORAGE_TOPIC: workbench.connect.offsets
      STATUS_STORAGE_TOPIC: workbench.connect.status
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      WORKBENCH_DB_HOST: postgres
      WORKBENCH_DB_PORT: 5432
      WORKBENCH_DB_USER: workbench
      WORKBENCH_DB_PASSWORD: workbench
      WORKBENCH_DB_NAME: workbench
    ports:
      - "8083:8083"

  debezium-init:
    profiles: ["distributed"]
    image: curlimages/curl:8.14.1
    depends_on:
      - debezium
    volumes:
      - ./docker/debezium/workbench-outbox-connector.json:/config/workbench-outbox-connector.json:ro
    command:
      - sh
      - -ec
      - |
        until curl --fail --silent http://debezium:8083/connectors >/dev/null; do
          sleep 2
        done
        curl --fail --show-error --silent \
          -X PUT \
          -H 'Content-Type: application/json' \
          --data-binary @/config/workbench-outbox-connector.json \
          http://debezium:8083/connectors/workbench-outbox/config

volumes:
  valkey-data:
