services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v25.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  debezium:
    image: quay.io/debezium/connect:3.1.2.Final
    depends_on:
      postgres:
        condition: service_started
      redpanda:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: workbench-connect
      CONFIG_STORAGE_TOPIC: workbench.connect.configs
      OFFSET_STORAGE_TOPIC: workbench.connect.offsets
      STATUS_STORAGE_TOPIC: workbench.connect.status
    ports:
      - "8083:8083"
