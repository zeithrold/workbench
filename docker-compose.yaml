services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: workbench
      POSTGRES_USER: workbench
      POSTGRES_PASSWORD: workbench
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:v25.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

  debezium:
    image: debezium/connect:3.1.2.Final
    depends_on:
      - postgres
      - redpanda
    environment:
      BOOTSTRAP_SERVERS: redpanda:19092
      GROUP_ID: workbench-connect
      CONFIG_STORAGE_TOPIC: workbench.connect.configs
      OFFSET_STORAGE_TOPIC: workbench.connect.offsets
      STATUS_STORAGE_TOPIC: workbench.connect.status
    ports:
      - "8083:8083"
