name: Workbench toolchain setup
description: JDK 25, pnpm, Node.js, Gradle, and uv for Workbench CI jobs

inputs:
  fetch-depth:
    description: Git fetch depth for checkout (omit to skip checkout)
    required: false
    default: ""
  install-playwright:
    description: Install Playwright Chromium for Storybook browser tests and E2E
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      if: inputs.fetch-depth != ''
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        persist-credentials: false

    - name: Set up Java
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: temurin
        java-version: "25"

    - name: Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: 10.33.0

    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "24"
        cache: pnpm
        cache-dependency-path: workbench-frontend/pnpm-lock.yaml

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        gradle-version: wrapper
        cache-provider: basic

    - name: Set up uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      with:
        enable-cache: true
        cache-dependency-glob: |
          scripts/ci/uv.lock
          scripts/dev/uv.lock

    - name: Prepare frontend environment
      shell: bash
      working-directory: workbench-frontend
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true'
      shell: bash
      working-directory: workbench-frontend
      run: |
        pnpm install --frozen-lockfile
        pnpm exec playwright install --with-deps chromium
