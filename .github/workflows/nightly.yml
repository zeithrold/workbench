name: Nightly

on:
  schedule:
    # 02:00 Asia/Shanghai (UTC+8)
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  qodana:
    name: Nightly (Qodana)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Qodana scan
        uses: ./.github/actions/qodana-scan
        with:
          qodana-token: ${{ secrets.QODANA_TOKEN_1857082304 }}
          artifact-name: nightly-qodana-${{ github.run_id }}

  backend-module:
    name: Nightly (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - module: kernel
            timeout: 30
          - module: application
            timeout: 30
          - module: agile
            timeout: 30
          - module: tenant
            timeout: 30
          - module: identity
            timeout: 30
          - module: notification
            timeout: 30
          - module: data
            timeout: 45
          - module: security
            timeout: 35
          - module: web
            timeout: 45
          - module: worker
            timeout: 35

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup

      - name: Module nightly verification
        run: |
          ./gradlew :workbench-${{ matrix.module }}:ciNightlyCheck \
            --no-daemon --no-parallel --no-configuration-cache --scan --profile

      - name: Upload module reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-backend-${{ matrix.module }}-${{ github.run_id }}
          path: workbench-${{ matrix.module }}/build
          retention-days: 14

      - name: Upload module Gradle profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-profile-nightly-${{ matrix.module }}-${{ github.run_id }}
          path: build/reports/profile/
          if-no-files-found: warn
          retention-days: 14

  test-support:
    name: Nightly (test-support)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup

      - name: Test-support verification
        run: ./gradlew :workbench-test-support:check --no-daemon --scan --profile

      - name: Upload test-support profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-profile-nightly-test-support-${{ github.run_id }}
          path: build/reports/profile/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: Nightly (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup
        with:
          install-playwright: "true"

      - name: Frontend verification
        run: ./gradlew :workbench-frontend:check --no-daemon --scan --profile

      - name: Frontend coverage report
        if: success()
        run: ./gradlew frontendUnitCoverage --no-daemon --scan --profile

      - name: Upload frontend reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-frontend-${{ github.run_id }}
          path: workbench-frontend/coverage
          retention-days: 14

      - name: Upload frontend Gradle profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-profile-nightly-frontend-${{ github.run_id }}
          path: build/reports/profile/
          if-no-files-found: warn
          retention-days: 14

  unit-coverage:
    name: Nightly (unit coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup

      - name: Generate unit-only Kover XML
        run: |
          ./gradlew koverUnitXmlReport \
            --no-daemon --no-configuration-cache --scan --profile

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-unit-coverage-${{ github.run_id }}
          path: build/reports/kover/unit
          retention-days: 14

      - name: Upload unit coverage Gradle profile
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gradle-profile-nightly-unit-coverage-${{ github.run_id }}
          path: build/reports/profile/
          if-no-files-found: warn
          retention-days: 14

  aggregate-report:
    name: Nightly (aggregate report)
    needs: [backend-module, frontend, unit-coverage]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup

      - name: Download nightly artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nightly-*-${{ github.run_id }}
          merge-multiple: false
          path: nightly-artifacts

      - name: Restore report paths
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          for artifact_dir in nightly-artifacts/nightly-backend-*; do
            base="$(basename "${artifact_dir}")"
            module="${base#nightly-backend-}"
            module="${module%-${RUN_ID}}"
            mkdir -p "workbench-${module}/build"
            cp -a "${artifact_dir}/." "workbench-${module}/build/"
          done

          frontend_artifact="nightly-artifacts/nightly-frontend-${RUN_ID}"
          if [ -d "${frontend_artifact}" ]; then
            mkdir -p workbench-frontend/coverage
            cp -a "${frontend_artifact}/." workbench-frontend/coverage/
          fi

          unit_artifact="nightly-artifacts/nightly-unit-coverage-${RUN_ID}"
          if [ -d "${unit_artifact}" ]; then
            mkdir -p build/reports/kover/unit
            cp -a "${unit_artifact}/." build/reports/kover/unit/
          fi

      - name: Merge PIT reports
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: ./gradlew ciMergePitReports --no-daemon --scan --profile

      - name: Merge Kover reports
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: ./gradlew ciMergeKoverReports --no-daemon --scan --profile

      - name: Publish nightly report
        if: always()
        env:
          EXTENDED_TESTS: "true"
          REPO_ROOT: ${{ github.workspace }}
        run: ./gradlew -q ciRenderQualitySummary --no-daemon --scan --profile >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregated reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-reports-${{ github.run_id }}
          path: |
            build/reports/kover/
            build/reports/pitest/
            build/reports/workbench-ci/
            build/reports/profile/
            workbench-*/build/reports/kover/
            workbench-*/build/reports/pitest/
            workbench-frontend/coverage/
          retention-days: 30

  gate:
    name: Nightly (gate)
    needs: [qodana, backend-module, test-support, frontend, unit-coverage, aggregate-report]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require all nightly jobs to succeed
        env:
          QODANA_RESULT: ${{ needs.qodana.result }}
          BACKEND_RESULT: ${{ needs.backend-module.result }}
          TEST_SUPPORT_RESULT: ${{ needs.test-support.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          UNIT_COVERAGE_RESULT: ${{ needs.unit-coverage.result }}
          AGGREGATE_RESULT: ${{ needs.aggregate-report.result }}
        run: |
          set -euo pipefail
          failed=0
          for name in QODANA BACKEND TEST_SUPPORT FRONTEND UNIT_COVERAGE AGGREGATE; do
            result_var="${name}_RESULT"
            result="${!result_var}"
            if [ "${result}" != "success" ]; then
              echo "::error::Nightly job ${name} finished with: ${result}"
              failed=1
            fi
          done
          exit "${failed}"
