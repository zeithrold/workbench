name: Quality Gate

on:
  workflow_call:
    secrets:
      QODANA_TOKEN:
        required: false

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/workbench-web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/workbench-worker

jobs:
  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana scan
        uses: ./.github/actions/qodana-scan
        with:
          qodana-token: ${{ secrets.QODANA_TOKEN }}
          artifact-name: qodana-${{ github.run_id }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch compare branches
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}:refs/remotes/origin/${{ github.event.repository.default_branch }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" != "${{ github.event.repository.default_branch }}" ]; then
            git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          fi

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup
        with:
          install-playwright: "true"

      - name: Lint diff coverage Python wrapper
        working-directory: scripts/ci
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Static checks, tests, and coverage gate
        env:
          COMPARE_BRANCH: >-
            ${{
              github.event_name == 'pull_request'
              && format('origin/{0}', github.base_ref)
              || format('origin/{0}', github.event.repository.default_branch)
            }}
        run: ./gradlew check --no-daemon --scan --profile

      - name: Build web and worker boot jars
        run: ./gradlew :workbench-web:bootJar :workbench-worker:bootJar --no-daemon --scan --profile

      - name: Upload boot jars
        uses: actions/upload-artifact@v4
        with:
          name: boot-jars
          path: |
            workbench-web/build/libs/workbench-web.jar
            workbench-worker/build/libs/workbench-worker.jar

      - name: Generate full Kover XML report
        if: success() || failure()
        run: ./gradlew koverXmlReport --no-daemon --scan --profile

      - name: Generate unit Kover XML report
        if: success() || failure()
        run: ./gradlew koverUnitXmlReport --no-daemon --scan --profile

      - name: Frontend unit coverage report
        if: success()
        run: ./gradlew frontendUnitCoverage --no-daemon --scan --profile

      - name: Frontend full coverage report
        if: success()
        run: ./gradlew frontendFullCoverage --no-daemon --scan --profile

      - name: Upload quality gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-${{ github.run_id }}
          path: |
            build/reports/kover/
            build/reports/profile/
            build/reports/kover/e2e/
            workbench-frontend/coverage/unit/
            workbench-frontend/coverage/full/
            workbench-frontend/coverage/storybook-components/
            workbench-frontend/storybook-static/
          retention-days: 14

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup
        with:
          install-playwright: "true"

      - name: Run frontend E2E stack
        run: ./gradlew :workbench-frontend:e2eCheck --no-daemon --scan --profile

      - name: Upload frontend E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-${{ github.run_id }}
          path: |
            workbench-frontend/coverage/e2e/
            workbench-frontend/playwright-report/
            build/reports/kover/
            build/reports/kover/e2e/
            build/reports/profile/
          retention-days: 14

  quality-gate-finalize:
    name: Quality Gate Finalize
    needs: [quality-gate, frontend-e2e]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch compare branches
        run: |
          git fetch origin "${{ github.event.repository.default_branch }}:refs/remotes/origin/${{ github.event.repository.default_branch }}"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.base_ref }}" != "${{ github.event.repository.default_branch }}" ]; then
            git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          fi

      - name: Set up toolchain
        uses: ./.github/actions/workbench-setup

      - name: Download quality gate artifacts
        uses: actions/download-artifact@v4
        with:
          name: quality-gate-${{ github.run_id }}
          path: .

      - name: Download frontend E2E artifacts
        if: needs.frontend-e2e.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: frontend-e2e-${{ github.run_id }}
          path: .

      - name: Check diff coverage
        if: needs.quality-gate.result == 'success'
        working-directory: scripts/ci
        env:
          COMPARE_BRANCH: >-
            ${{
              github.event_name == 'pull_request'
              && format('origin/{0}', github.base_ref)
              || format('origin/{0}', github.event.repository.default_branch)
            }}
          FAIL_UNDER_BACKEND: "90"
          FAIL_UNDER_FRONTEND: "70"
          REPO_ROOT: ${{ github.workspace }}
        run: uv run check-diff-coverage --target all

      - name: Publish quality gate report
        if: always()
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: ./gradlew -q ciRenderQualitySummary --no-daemon --scan --profile >> "$GITHUB_STEP_SUMMARY"

      - name: Upload finalized quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: |
            build/reports/kover/
            build/reports/kover/e2e/
            scripts/ci/diff-cover-backend.html
            scripts/ci/diff-cover-frontend.html
            scripts/ci/diff-coverage-results.json
            build/reports/workbench-ci/
            build/reports/profile/
            workbench-frontend/coverage/
            workbench-frontend/storybook-static/
          retention-days: 14

      - name: Fail if quality gate failed
        if: needs.quality-gate.result != 'success'
        run: exit 1

      - name: Fail if frontend E2E failed
        if: needs.frontend-e2e.result != 'success'
        run: exit 1

  docker:
    name: Docker (${{ matrix.arch }})
    needs: [quality-gate-finalize, qodana]
    if: >-
      github.event_name != 'pull_request'
      && (github.event_name != 'push'
          || github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: boot-jars

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (web)
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          flavor: suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (worker)
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          flavor: suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workbench-web/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workbench-worker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}

  docker-manifest:
    name: Docker manifest
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          create_manifest() {
            local image="$1"
            local tag="$2"
            docker buildx imagetools create \
              -t "${image}:${tag}" \
              "${image}:${tag}-amd64" \
              "${image}:${tag}-arm64"
          }

          for image in "${WEB_IMAGE}" "${WORKER_IMAGE}"; do
            create_manifest "${image}" "${GITHUB_SHA}"
            create_manifest "${image}" "${GITHUB_REF_NAME}"

            if [ "${GITHUB_REF}" = "refs/heads/${DEFAULT_BRANCH}" ]; then
              create_manifest "${image}" "latest"
            fi
          done
