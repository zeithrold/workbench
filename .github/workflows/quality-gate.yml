name: Quality Gate

on:
  workflow_call:
    inputs:
      extended-tests:
        description: Run fuzz and mutation testing in addition to the standard quality gate
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/workbench-web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/workbench-worker

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: workbench-frontend/pnpm-lock.yaml

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Static checks, tests, and coverage gate
        run: ./gradlew check --no-daemon

      - name: Build web and worker boot jars
        run: ./gradlew :workbench-web:bootJar :workbench-worker:bootJar --no-daemon

      - name: Upload boot jars
        uses: actions/upload-artifact@v4
        with:
          name: boot-jars
          path: |
            workbench-web/build/libs/workbench-web.jar
            workbench-worker/build/libs/workbench-worker.jar

      - name: Fuzz tests
        if: inputs.extended-tests
        run: ./gradlew fuzzTest --no-daemon

      - name: Mutation tests
        if: inputs.extended-tests
        run: ./gradlew mutationTest --no-daemon --no-parallel --no-configuration-cache

      - name: Generate Kover XML report
        if: success() || failure()
        run: ./gradlew koverXmlReport --no-daemon

      - name: Publish quality gate report
        if: always()
        env:
          EXTENDED_TESTS: ${{ inputs.extended-tests }}
        run: python3 scripts/ci/render-quality-summary.py >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.run_id }}
          path: |
            build/reports/kover/
            build/reports/pitest/
          retention-days: 14

  docker:
    name: Docker (${{ matrix.arch }})
    needs: quality-gate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: boot-jars

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (web)
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          flavor: suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (worker)
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          flavor: suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workbench-web/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: workbench-worker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}

  docker-manifest:
    name: Docker manifest
    needs: docker
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          create_manifest() {
            local image="$1"
            local tag="$2"
            docker buildx imagetools create \
              -t "${image}:${tag}" \
              "${image}:${tag}-amd64" \
              "${image}:${tag}-arm64"
          }

          for image in "${WEB_IMAGE}" "${WORKER_IMAGE}"; do
            create_manifest "${image}" "${GITHUB_SHA}"
            create_manifest "${image}" "${GITHUB_REF_NAME}"

            if [ "${GITHUB_REF}" = "refs/heads/${DEFAULT_BRANCH}" ]; then
              create_manifest "${image}" "latest"
            fi
          done
