spring:
  application:
    name: workbench
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:ink/doa/workbench/data/migration
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  web:
    error:
      path: /api/error
server:
  port: 8080
management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,metrics
  tracing:
    export:
      enabled: true
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
springdoc:
  api-docs:
    path: /api/openapi
scalar:
  enabled: true
  path: /api/scalar
  url: /api/openapi
workbench:
  tracing:
    echo-traceparent:
      enabled: true
  instance:
    setup-token: ${WORKBENCH_SETUP_TOKEN:}
    id: ${WORKBENCH_INSTANCE_ID:}
    name: ${WORKBENCH_INSTANCE_NAME:}
  invitation-link:
    public-base-url: ${WORKBENCH_INVITATION_LINK_PUBLIC_BASE_URL:}
logging:
  structured:
    format:
      console: ecs
