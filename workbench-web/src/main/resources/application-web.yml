spring:
  application:
    name: workbench
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  web:
    error:
      path: /api/error
server:
  port: 8080
management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info,metrics
  tracing:
    export:
      enabled: true
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
springdoc:
  api-docs:
    path: /api/openapi
scalar:
  enabled: true
  path: /api/scalar
  url: /api/openapi
workbench:
  messaging:
    transport: ${WORKBENCH_MESSAGING_TRANSPORT:postgres}
  tracing:
    echo-traceparent:
      enabled: true
logging:
  structured:
    format:
      console: ecs
