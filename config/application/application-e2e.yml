spring:
  datasource:
    url: jdbc:postgresql://${E2E_POSTGRES_HOST:localhost}:${E2E_POSTGRES_PORT:5432}/workbench
    username: workbench
    password: workbench
  data:
    redis:
      host: ${E2E_VALKEY_HOST:localhost}
      port: ${E2E_VALKEY_PORT:6379}
  kafka:
    bootstrap-servers: ${E2E_KAFKA_BOOTSTRAP:localhost:19092}

workbench:
  elasticsearch:
    url: ${E2E_ELASTICSEARCH_URL:http://localhost:9200}
  storage:
    endpoint: ${E2E_MINIO_ENDPOINT:http://localhost:9000}
    access-key: workbench
    secret-key: workbench
    bucket: workbench-attachments
    region: us-east-1
    auto-create-bucket: true
    path-style-access: true
