spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
workbench:
  messaging:
    epoch: ${WORKBENCH_MESSAGING_EPOCH:${HOSTNAME:local}}
    batch-size: ${WORKBENCH_MESSAGING_BATCH_SIZE:50}
    concurrency: ${WORKBENCH_MESSAGING_CONCURRENCY:4}
    lease-duration: ${WORKBENCH_MESSAGING_LEASE_DURATION:2m}
    fallback-poll-interval: ${WORKBENCH_MESSAGING_POLL_INTERVAL:5s}
    max-attempts: ${WORKBENCH_MESSAGING_MAX_ATTEMPTS:8}
    retention-cleanup-batch-size: ${WORKBENCH_OUTBOX_CLEANUP_BATCH_SIZE:1000}
    retention-cleanup-interval: ${WORKBENCH_OUTBOX_CLEANUP_INTERVAL:1h}
    shutdown-timeout: ${WORKBENCH_MESSAGING_SHUTDOWN_TIMEOUT:30s}
  instance:
    setup-token: ${WORKBENCH_SETUP_TOKEN:}
    id: ${WORKBENCH_INSTANCE_ID:}
    name: ${WORKBENCH_INSTANCE_NAME:}
  invitation-link:
    public-base-url: ${WORKBENCH_INVITATION_LINK_PUBLIC_BASE_URL:}
