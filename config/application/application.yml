spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
workbench:
  outbox:
    relay-delay-ms: ${WORKBENCH_OUTBOX_RELAY_DELAY_MS:1000}
    relay-enabled: true
  instance:
    setup-token: ${WORKBENCH_SETUP_TOKEN:}
    id: ${WORKBENCH_INSTANCE_ID:}
    name: ${WORKBENCH_INSTANCE_NAME:}
  invitation-link:
    public-base-url: ${WORKBENCH_INVITATION_LINK_PUBLIC_BASE_URL:}
