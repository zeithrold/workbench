spring:
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:ink/doa/workbench/data/migration
workbench:
  instance:
    setup-token: ${WORKBENCH_SETUP_TOKEN:}
    id: ${WORKBENCH_INSTANCE_ID:}
    name: ${WORKBENCH_INSTANCE_NAME:}
  invitation-link:
    public-base-url: ${WORKBENCH_INVITATION_LINK_PUBLIC_BASE_URL:}
