spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workbench
    username: workbench
    password: workbench
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:19092
workbench:
  session-cookie:
    secure: false
  elasticsearch:
    url: http://localhost:9200
  storage:
    endpoint: http://localhost:9000
    access-key: workbench
    secret-key: workbench
    bucket: workbench-attachments
    region: us-east-1
    max-file-size: 25MB
    auto-create-bucket: true
    path-style-access: true

management:
  tracing:
    sampling:
      probability: 1.0
