# PIT mutation testing — single source of truth for all JVM backend modules.
# Applied from root build.gradle.kts; subprojects must not declare pitest {} blocks.

# Plugin and engine
junit5PluginVersion=1.2.2

# Thresholds (aggregator gate)
mutationThreshold=1

# Kotlin-friendly defaults
avoidCallsTo=kotlin.jvm.internal.Intrinsics

# Align with Kover excludes (Application / Spring Configuration)
excludedClasses=\
  *.WorkbenchApplication*,\
  *.WorkbenchWorkerApplication*,\
  *.api.*Configuration,\
  *.security.*Configuration,\
  *.infrastructure.persistence.*Configuration,\
  *.data.persistence.*Configuration

# Exclude slow / non-unit tests from PIT runs (align with unitTest task: no integration, no fuzz)
excludedTestClasses=*IntegrationTest
excludedGroups=fuzz,integration

# Module policy
skipModules=
autoSkipModulesWithoutTests=true

# Reports: per-module XML for aggregation; root HTML from pitestReportAggregate
perModuleOutputFormats=XML
rootOutputFormats=XML,HTML
timestampedReports=false
exportLineCoverage=true
